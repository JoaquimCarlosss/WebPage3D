    <div class="main">
        <div class="parallaxDiv">

    <div class="charactersDiv">
        <h3 style="font-size: 24px;">
            Characters :
        </h3>
        <div class="presentationCont">
            <div class="commentsCont">
                <p class="initialMessages" style="font-size: 40px;">All This </p>
                <p class="initialMessages" style="color: #d400ff;">Characters</p>
                <p class="initialMessages" style="font-size: 40px" ;>Are Free, Enjoy 😊</p>
            </div>
            <div class="bigModel">
                <div class="Viewer3D" id="bigviewer">
                    
                </div>  
            </div>
        </div>
        <div class="Container3D" id="containerForCharacters">

        </div>

    <script src="https://unpkg.com/three@0.146.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/loaders/OBJLoader.js"></script>
    <script>
        let objsLi = ["objs\\base2.obj","objs\\base1.obj","objs\\base.obj",
        "objs\\base2 copy.obj","objs\\base2.obj","objs\\base2.obj","objs\\base2.obj",
        "objs\\base2.obj","objs\\base2.obj"];

        for (let index = 0; index < objsLi.length; index++) {
            
            let container = document.getElementById("containerForCharacters");
            let div = document.createElement("div");

            div.className = "Viewer3D";

            let scene = new THREE.Scene();
            let camera = new THREE.PerspectiveCamera(70,16/9,1,400);
            let objLoader = new THREE.OBJLoader();
            let ambLight = new THREE.AmbientLight(0xfff,0.8);
            let dirLight = new THREE.DirectionalLight(0xfff,0.8);
            let renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true
            });

            camera.position.set(0,-0.4,5);
            renderer.setClearColor(0x000,0);

            let obj = null;
            scene.add(dirLight);
            scene.add(ambLight);

            objLoader.load(
                objsLi[index],
                function (object)
                {
                    obj = object;
                    obj.position.set(-0.9,-1.2,3);
                    obj.scale.set(1,1,1);
                    obj.rotation.set(0,0,0);    
                    scene.add(obj);
                    renderer.render(scene,camera);
                },
                undefined,
                function (error)
                {
                    console.error(error);
                },
            );

            div.appendChild(renderer.domElement);
            container.appendChild(div);
        }

    
    </script>
