<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Links for Styles and Fonts-->
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Viga&display=swap" rel="stylesheet">
</head>
<body>
    <div class="BodyClass">
        <nav>
            <img class="navIcons" src="datas/icons/imgs/logo.png">
            <ul>
                <!--main Page Link-->
                <li id="navHome"><a href="index.html">Home</a></li>
                <!--categorie Page Link-->
                <li id="navCategories"><a href="31205715.html">Categories</a></li>
                <!--community Page Link-->
                <li id="navCommunity"><a href="">Community</a></li>
            </ul>
            <!-- Search Page Link to open other page to search 3d objects-->
            <a href="search.html" id="searchButton">
                <img class="navIcons" src="datas/icons/imgs/search.png" alt="">
            </a>
            <!--Menu Button for acess of others options-->
            <button id="navMenu" class="menuButton"><img class="navIcons" src="datas/icons/imgs/menu.png" alt=""></button>
            <ul class="maybeHiddenElement">
                <li>
                    <button id="navMenuHidden" class="menuButton"><img class="navIcons" src="datas/icons/imgs/menu.png" alt=""></button>
                </li>
            </ul>
        </nav>

        <!--Presentation Area for link to an other page-->
        <div class="Presentation">
            <!--Message-->
            <div class="ContainerForInitialMessages">
                <h2 >
                    Enjoy The diversity <br>
                    of our Models in <br>
                </h2>
                <h2 style="background:none; color: #38b6ff;">
                    Categories
                </h2>
                <!--Popular Link Div-->
                <div class="PopularLinkButton">
                    <!--Popular Link-->
                    <a href="">
                        All - Popular
                    </a>
                </div>
            </div>
            <div class="GifContainer">
                <img src="datas/gifs/37a279_7d38610e4f934696b395440053342e0c~mv2.gif" alt="">
            </div>
        </div>
        <!--Conatainer of categories-->
        <main class="CategoriesMain">
            <!--Div for one of the Categories to Agroupate all ContainerFor3D-->
            <div class="GeneralCategoriesDiv">
                <!--Message to notify of others page to user-->
                <div class="MessageFromCategories">
                    <h2>
                        Characters:
                    </h2>
                    <!--Big Model For Presentation Of Category-->
                    <div class="Big3DModel" id="charecterBig3DModel">

                    </div>
                </div>
                <!--Container For 3D Conatain one Group of 3D Models in Grid Of Two-->
                <div class="ContainerFor3D" id="containerForCharacters">
                </div>
            </div>
        </main>
    </div>
</body>

<script src="https://unpkg.com/three@0.146.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/loaders/OBJLoader.js"></script>
    <script>
        let objsLi = ["datas/objs/base2.obj","datas/objs/base1.obj","datas/objs/base.obj",
        "datas/objs/base2.obj","datas/objs/base2.obj","datas/objs/base2.obj","datas/objs/base2.obj",
        "datas/objs/base2.obj","datas/objs/base2.obj"];

        let xPosition = -1;
        let yPosition = 0.2;

        for (let index = 0; index < objsLi.length; index++) {
            
            let container = document.getElementById("containerForCharacters");
            let uiConatainer = document.createElement("div");
            let upUIContainer = document.createElement("div");
            let div = document.createElement("div");
            let categoryButton = document.createElement("button");
            let downloadButton = document.createElement("button");
            let infoButton = document.createElement("button");
            let downloadImg = document.createElement("img");
            let infoIcon = document.createElement("img");
            let defaultWidth = 400;

            div.className = "QuadViewer3D";
            uiConatainer.className = "UIContainer";
            upUIContainer.className = "UIContainer";
            categoryButton.className = "CategoryButton";
            downloadButton.className = "DownloadButton";
            infoButton.className = "InfoButton";
            categoryButton.innerText = "Category";
            downloadImg.src = "datas/icons/imgs/download.png";
            infoIcon.src = "datas/icons/imgs/infoIcon.png";

            let scene = new THREE.Scene();
            let camera = new THREE.PerspectiveCamera(70,16/9,0.1,400);
            let objLoader = new THREE.OBJLoader();
            let ambLight = new THREE.AmbientLight(0xfff,0.8);
            let dirLight = new THREE.DirectionalLight(0xfff,0.8);
            let renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true
            });

            if(window.innerWidth > 750)
            {
                xPosition = -1.7;
                yPosition = -0.2;
            }

            const size = new THREE.Vector2();
            camera.position.set(xPosition,yPosition,4.6);
            
            renderer.getSize(size);
            renderer.setClearColor(0xfff,0);
            renderer.setSize(defaultWidth / 3, size.height - 40);

            scene.add(dirLight);
            scene.add(ambLight);

            let obj = null;
            objLoader.load(
                objsLi[index],
                function (object)
                {
                    obj = object;
                    obj.position.set(-0.7,-1,2.3);
                    obj.scale.set(2,1,1);
                    obj.rotation.set(0,0,0);    
                    scene.add(obj);
                    renderer.render(scene,camera);
                },
                undefined,
                function (error)
                {
                    console.error(error);
                },
            );
            
            div.appendChild(upUIContainer);
            div.appendChild(renderer.domElement);
            div.appendChild(uiConatainer);
            uiConatainer.appendChild(categoryButton);
            uiConatainer.appendChild(downloadButton);
            upUIContainer.appendChild(infoButton);
            downloadButton.appendChild(downloadImg);
            infoButton.appendChild(infoIcon);
            container.appendChild(div);
        }

    
    </script>


</html>
